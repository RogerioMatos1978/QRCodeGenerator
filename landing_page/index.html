<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando...</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111111;
            color: #ffffff;
            text-align: center;
        }
        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #333333;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a { color: #4da3ff; }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <p>Redirecionando você para o aplicativo...</p>
        <p><a id="manual-link" href="https://play.google.com/store/apps/details?id=education.layers.sesigo&hl=pt_BR">Clique aqui se não for redirecionado automaticamente</a></p>
    </div>

    <script>
        (function () {
            var ANDROID_URL = "https://play.google.com/store/apps/details?id=education.layers.sesigo&hl=pt_BR";
            var IOS_URL = "https://apps.apple.com/br/app/sesi-senai-digit-all/id6738126475";
            var FALLBACK_URL = "https://play.google.com/store/apps/details?id=education.layers.sesigo&hl=pt_BR";

            function detectAndRedirect() {
                var userAgent = navigator.userAgent || navigator.vendor || window.opera;
                var destination = FALLBACK_URL;

                if (/android/i.test(userAgent)) {
                    destination = ANDROID_URL;
                } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                    destination = IOS_URL;
                }

                document.getElementById("manual-link").href = destination;
                window.location.replace(destination);
            }

            detectAndRedirect();
        })();
    </script>
</body>
</html>
